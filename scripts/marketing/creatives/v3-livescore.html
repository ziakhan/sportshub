<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Work+Sans:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="_brand.css" />
<style>
  .stage { gap: 44px; padding: 80px 80px 250px; }
  h1 { font-size: 80px; color: #fff; animation: rise 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) 0.2s both; }
  .scorecard { width: 700px; border-radius: 36px; overflow: hidden; text-align: left; box-shadow: 0 50px 100px -30px rgba(0, 0, 0, 0.7); flex-shrink: 0; animation: rise 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.45s both; }
  .hero {
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; padding: 40px 36px 34px;
    background:
      radial-gradient(90% 140% at 0% 0%, rgba(22, 163, 74, 0.28) 0%, transparent 55%),
      radial-gradient(90% 140% at 100% 0%, rgba(91, 33, 182, 0.3) 0%, transparent 55%),
      linear-gradient(135deg, var(--stage), var(--stage-2));
    color: #fff; text-align: center;
  }
  .crest { width: 84px; height: 84px; border-radius: 22px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-family: var(--display); font-weight: 800; font-size: 32px; color: #fff; }
  .tname { font-family: var(--display); font-weight: 800; font-size: 24px; }
  .score { font-family: var(--condensed); font-weight: 700; font-size: 96px; line-height: 1; margin-top: 4px; position: relative; height: 96px; }
  .score span { position: absolute; left: 0; right: 0; }
  .score .old { animation: numOut 0.35s ease-in both; }
  .score .new { animation: numIn 0.4s ease-out both, glow 1.4s ease-out both; }
  .home .old { animation-delay: 2.0s; }
  .home .new { animation-delay: 2.05s, 2.05s; }
  .away .old { animation-delay: 4.5s; }
  .away .new { animation-delay: 4.55s, 4.55s; }
  .livepill { background: var(--live-500); border-radius: 999px; padding: 8px 22px; font-family: var(--display); font-weight: 800; font-size: 20px; text-transform: uppercase; letter-spacing: 0.14em; display: inline-flex; align-items: center; gap: 8px; }
  .livepill i { width: 9px; height: 9px; background: #fff; border-radius: 50%; display: inline-block; animation: pulse 1.2s ease-in-out infinite; }
  .period { font-family: var(--condensed); font-weight: 700; font-size: 34px; margin-top: 8px; }
  .clock { color: var(--gold-300); font-weight: 800; font-size: 26px; }
  .playchip {
    position: absolute; top: 26px; left: 50%; width: max-content;
    background: #ffffff; color: var(--ink-950); border-radius: 999px; padding: 14px 30px;
    font-size: 26px; font-weight: 600; box-shadow: 0 20px 40px -14px rgba(0, 0, 0, 0.5);
  }
  .playchip b { color: var(--court-600); }
  .chip1 { animation: chipIn 0.5s cubic-bezier(0.3, 1.3, 0.5, 1) 1.5s both, chipOut 0.4s ease-in 3.9s forwards; }
  .chip2 { animation: chipIn 0.5s cubic-bezier(0.3, 1.3, 0.5, 1) 4.3s both, chipOut 0.4s ease-in 6.3s forwards; }
  .box { background: #ffffff; padding: 10px 0 6px; }
  .brow { display: grid; grid-template-columns: 1fr 90px 90px 90px; padding: 14px 34px; font-size: 26px; align-items: center; color: var(--ink-950); border-top: 1.5px solid var(--ink-100); }
  .brow.head { color: var(--ink-500); font-size: 19px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; border-top: 0; }
  .brow .num { text-align: right; font-variant-numeric: tabular-nums; position: relative; }
  .brow .pts { font-weight: 800; color: var(--hoop-600); }
  .brow .j { color: var(--ink-500); margin-right: 10px; }
  .brow.top { background: rgba(22, 163, 74, 0.08); }
  .swap { position: relative; display: inline-block; min-width: 52px; height: 1.25em; vertical-align: top; }
  .swap span { position: absolute; right: 0; top: 0; }
  .swap .old { animation: numOut 0.35s ease-in both; }
  .swap .new { animation: numIn 0.4s ease-out both, cellglow 1.4s ease-out both; }
  .jp .old { animation-delay: 2.15s; } .jp .new { animation-delay: 2.2s, 2.2s; }
  .ma .old { animation-delay: 2.55s; } .ma .new { animation-delay: 2.6s, 2.6s; }
  .sub { font-family: var(--display); font-size: 40px; font-weight: 700; color: #fff; animation: rise 0.6s ease-out 6.6s both; }
  .sub em { font-style: normal; color: #f9a178; }
  .footer-brand { animation: fadein 0.6s ease-out 0.4s both; }
  @keyframes rise { from { opacity: 0; transform: translateY(36px); } to { opacity: 1; transform: none; } }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  @keyframes numOut { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateY(-40%); } }
  @keyframes numIn { from { opacity: 0; transform: translateY(45%); } to { opacity: 1; transform: none; } }
  @keyframes glow { 0% { color: #86efac; text-shadow: 0 0 36px rgba(74, 222, 128, 0.9); } 100% { color: #ffffff; text-shadow: none; } }
  @keyframes cellglow { 0% { color: var(--court-600); text-shadow: 0 0 18px rgba(74, 222, 128, 0.8); } 100% { text-shadow: none; } }
  @keyframes chipIn { from { opacity: 0; transform: translate(-50%, -30px); } to { opacity: 1; transform: translate(-50%, 0); } }
  @keyframes chipOut { from { opacity: 1; transform: translate(-50%, 0); } to { opacity: 0; transform: translate(-50%, -24px); } }
  body.story .stage { gap: 60px; }
</style>
</head>
<body>
<div class="stage dark">
  <div class="playchip chip1">#23 Jayden T. hits a three, <b>assist Marcus C.</b></div>
  <div class="playchip chip2">Huskies answer inside</div>
  <h1>Watch every game live.</h1>
  <div class="scorecard">
    <div class="hero">
      <div>
        <div class="crest" style="background:#16a34a">BF</div>
        <div class="tname">BF &middot; G10</div>
        <div class="score home"><span class="old">59</span><span class="new">62</span></div>
      </div>
      <div>
        <span class="livepill"><i></i>Live</span>
        <div class="period">Q4</div>
        <div class="clock">0:41</div>
      </div>
      <div>
        <div class="crest" style="background:#5b21b6">NT</div>
        <div class="tname">NT &middot; G10</div>
        <div class="score away"><span class="old">56</span><span class="new">58</span></div>
      </div>
    </div>
    <div class="box">
      <div class="brow head"><span>Player</span><span class="num">Pts</span><span class="num">Reb</span><span class="num">Ast</span></div>
      <div class="brow top"><span><span class="j">#23</span><b>Jayden T.</b></span><span class="num pts"><span class="swap jp"><span class="old">18</span><span class="new">21</span></span></span><span class="num">6</span><span class="num">3</span></div>
      <div class="brow"><span><span class="j">#7</span>Marcus C.</span><span class="num pts">11</span><span class="num">2</span><span class="num"><span class="swap ma"><span class="old">4</span><span class="new">5</span></span></span></div>
      <div class="brow"><span><span class="j">#11</span>Malik O.</span><span class="num pts">9</span><span class="num">8</span><span class="num">1</span></div>
    </div>
  </div>
  <p class="sub">No refresh. <em>It just moves.</em></p>
  <div class="footer-brand">
    <span class="wm"><span class="s">Sports</span><span class="h">Hub</span><span class="one">ONE</span></span>
    <span class="domain">sportshubone.com</span>
  </div>
</div>
<script>
  if (location.hash.includes("story")) document.body.classList.add("story");
  window.__duration = 8000;
  window.__seek = (t) => {
    document.getAnimations().forEach((a) => { a.pause(); a.currentTime = t; });
  };
</script>
</body>
</html>
