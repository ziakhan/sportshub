<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="_brand.css" />
<style>
  .stage { gap: 42px; padding: 80px 80px 240px; }
  h1 { font-size: 82px; max-width: 880px; animation: rise 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) 0.2s both; }
  .cal {
    width: 780px; flex-shrink: 0; background: #fff; border: 1.5px solid var(--ink-100); border-radius: 32px;
    box-shadow: 0 40px 80px -40px rgba(24, 24, 27, 0.25); text-align: left; overflow: hidden;
    animation: rise 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s both;
  }
  .toast {
    display: flex; align-items: center; gap: 16px; background: var(--ink-950); color: #fff;
    padding: 20px 30px; font-size: 24px; font-weight: 600; white-space: nowrap;
    animation: drop 0.55s cubic-bezier(0.3, 1.3, 0.5, 1) 3.6s both;
  }
  .toast .bell { flex: none; animation: ring 0.8s ease-in-out 4.15s both; }
  .toast b { color: var(--gold-300); }
  .crow { display: flex; align-items: center; justify-content: space-between; padding: 26px 34px; border-top: 1.5px solid var(--ink-100); font-size: 25px; white-space: nowrap; gap: 18px; }
  .crow .when { font-weight: 700; color: var(--ink-950); }
  .crow .what { color: var(--ink-500); }
  .dead { position: relative; }
  .dead .when, .dead .what { animation: dim 0.4s ease-out 1.5s both; }
  .dead .slash {
    position: absolute; left: 34px; right: 34px; top: 50%; height: 4px; border-radius: 2px;
    background: rgba(239, 68, 68, 0.7); transform: scaleX(0); transform-origin: left center;
    animation: sweep 0.45s ease-out 1.3s both;
  }
  .crow.new { background: var(--court-100); animation: grow 0.6s cubic-bezier(0.2, 0.9, 0.3, 1) 2.3s both; }
  .crow.new .badge { background: var(--court-600); color: #fff; font-size: 20px; font-weight: 700; border-radius: 999px; padding: 6px 16px; animation: pop 0.4s cubic-bezier(0.3, 1.5, 0.4, 1) 2.9s both; }
  .sub { font-family: var(--display); font-size: 42px; font-weight: 700; color: var(--ink-950); animation: rise 0.6s ease-out 5.6s both; }
  .sub em { font-style: normal; color: var(--hoop-500); }
  .footer-brand { animation: fadein 0.6s ease-out 0.4s both; }
  @keyframes rise { from { opacity: 0; transform: translateY(36px); } to { opacity: 1; transform: none; } }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  @keyframes dim { to { color: var(--ink-300); } }
  @keyframes sweep { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes grow { from { opacity: 0; transform: translateY(-24px) scaleY(0.6); } to { opacity: 1; transform: none; } }
  @keyframes pop { from { opacity: 0; transform: scale(0.4); } to { opacity: 1; transform: scale(1); } }
  @keyframes drop { from { opacity: 0; transform: translateY(-100%); } to { opacity: 1; transform: none; } }
  @keyframes ring { 0%, 100% { transform: rotate(0); } 20% { transform: rotate(18deg); } 45% { transform: rotate(-14deg); } 70% { transform: rotate(8deg); } }
  body.story .stage { gap: 68px; }
  body.story h1 { font-size: 104px; }
</style>
</head>
<body>
<div class="stage light">
  <h1>Game moved? Everyone already knows.</h1>
  <div class="cal">
    <div class="toast"><svg class="bell" viewBox="0 0 24 24" width="30" height="30" fill="#fcd34d"><path d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm8-6v-1l-2-2v-4a6 6 0 0 0-5-5.91V2.5a1 1 0 1 0-2 0v.59A6 6 0 0 0 6 9v4l-2 2v1Z"/></svg><span><b>Game Rescheduled</b> &middot; vs Huskies, Sat 4:00 PM</span></div>
    <div class="crow dead"><span class="when">Sat &middot; 2:00 PM</span><span class="what">vs Huskies &middot; Haber Rec Centre</span><span class="slash"></span></div>
    <div class="crow new"><span class="when">Sat &middot; 4:00 PM</span><span class="what">vs Huskies &middot; Haber Rec Centre</span><span class="badge">Updated</span></div>
    <div class="crow"><span class="when">Tue &middot; 6:30 PM</span><span class="what">Practice &middot; Court 2</span></div>
  </div>
  <p class="sub">Nobody forwards <em>anything</em>.</p>
  <div class="footer-brand">
    <span class="wm"><span class="s">Sports</span><span class="h">Hub</span><span class="one">ONE</span></span>
    <span class="domain">sportshubone.com</span>
  </div>
</div>
<script>
  if (location.hash.includes("story")) document.body.classList.add("story");
  window.__duration = 8000;
  window.__seek = (t) => {
    document.getAnimations().forEach((a) => { a.pause(); a.currentTime = t; });
  };
</script>
</body>
</html>
