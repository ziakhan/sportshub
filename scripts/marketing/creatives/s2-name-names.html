<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="_brand.css" />
<style>
  .stage { gap: 30px; padding: 66px 80px 230px; }
  h1 { font-size: 74px; }
  .rows { display: flex; flex-direction: column; gap: 13px; width: 820px; flex-shrink: 0; }
  .row {
    display: flex; align-items: center; justify-content: space-between; gap: 26px;
    background: rgba(255, 255, 255, 0.06); border: 1.5px solid rgba(255, 255, 255, 0.12);
    border-radius: 22px; padding: 15px 28px; text-align: left;
  }
  .row .them { font-size: 28px; font-weight: 600; color: rgba(255, 255, 255, 0.55); text-decoration: line-through; text-decoration-color: rgba(239, 68, 68, 0.8); text-decoration-thickness: 3px; white-space: nowrap; }
  .row .us { font-family: var(--display); font-size: 27px; font-weight: 700; color: #ffffff; text-align: right; }
  .row { justify-content: flex-start; }
  .row .them { flex: 1; }
  .punch { font-family: var(--display); font-size: 33px; font-weight: 700; color: rgba(255, 255, 255, 0.92); max-width: 840px; }
  .punch em { font-style: normal; color: #f9a178; }
</style>
</head>
<body>
<div class="stage dark">
  <div class="eyebrow">Name names</div>
  <h1>One app replaces the pile</h1>
  <div class="rows">
    <div class="row"><span class="tile" style="background:#4f46e5"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></span><span class="them">TeamSnap + Spond</span><span class="us">Team chat &amp; RSVPs</span></div>
    <div class="row"><span class="tile" style="background:#f24e1e"><svg viewBox="0 0 24 24"><path d="M13 2 3 14h7l-1 8 10-12h-7l1-8z"/></svg></span><span class="them">GameChanger</span><span class="us">Live scoring &amp; box scores</span></div>
    <div class="row"><span class="tile" style="background:#16a34a"><svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span><span class="them">SportsEngine</span><span class="us">Registration &amp; payments</span></div>
    <div class="row"><span class="tile" style="background:#f59e0b"><svg viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg></span><span class="them">RAMP + email chains</span><span class="us">Schedules, standings, refs</span></div>
    <div class="row"><span class="tile" style="background:#ef4444"><svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></span><span class="them">The spreadsheet</span><span class="us">Gone.</span></div>
  </div>
  <p class="punch">They each do a piece. <em>Nobody does the whole thing.</em></p>
  <div class="footer-brand">
    <span class="wm"><span class="s">Sports</span><span class="h">Hub</span><span class="one">ONE</span></span>
    <span class="domain">sportshubone.com</span>
  </div>
</div>
<script>const m = location.hash.replace("#", ""); if (m) document.body.classList.add(m);</script>
</body>
</html>
